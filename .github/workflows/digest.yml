name: AIxUX Digest to Feishu

on:
  schedule:
    # 每天 UTC 01:00 = 北京时间 09:00 (UTC+8)
    - cron: '0 1 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  digest:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Run digest bot
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_SECRET: ${{ secrets.FEISHU_SECRET }}
          FEISHU_KEYWORD: ${{ secrets.FEISHU_KEYWORD }}
          SOURCES_JSON: ${{ secrets.SOURCES_JSON }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BIGMODEL_API_KEY: ${{ secrets.BIGMODEL_API_KEY }}
        run: |
          python -m bot.run
      
      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/seen.json
          git diff --staged --quiet || git commit -m "chore: update seen.json [skip ci]"
          git push
